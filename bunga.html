<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ini Buat Kamu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f3f4f6;
        }

        /* Wadah Bunga */
        .flower-container {
            position: relative;
            width: 200px;
            height: 300px;
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        /* Animasi Mawar Mekar */
        .rose {
            position: absolute;
            bottom: 120px;
            animation: bloom 3s ease-in-out forwards;
        }

        .petal {
            position: absolute;
            background: radial-gradient(circle, #ff2e63 40%, #ff003c 100%);
            border-radius: 50%;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.5);
        }

        /* Kelopak Tengah */
        .petal.center {
            width: 40px;
            height: 40px;
            top: 0;
            left: -20px;
            z-index: 5;
        }

        /* Kelopak Dalam */
        .petal.inner-1 { width: 50px; height: 50px; top: -5px; left: -30px; transform: rotate(30deg); z-index: 4; }
        .petal.inner-2 { width: 50px; height: 50px; top: -5px; left: -10px; transform: rotate(-30deg); z-index: 4; }

        /* Kelopak Luar */
        .petal.outer-1 { width: 70px; height: 60px; top: -15px; left: -45px; transform: rotate(15deg); opacity: 0.9; z-index: 3; }
        .petal.outer-2 { width: 70px; height: 60px; top: -15px; left: -15px; transform: rotate(-15deg); opacity: 0.9; z-index: 3; }
        .petal.outer-3 { width: 80px; height: 70px; top: -20px; left: -35px; transform: rotate(45deg); opacity: 0.8; z-index: 2; }
        .petal.outer-4 { width: 80px; height: 70px; top: -20px; left: -45px; transform: rotate(-45deg); opacity: 0.8; z-index: 2; }

        /* Batang Bunga */
        .stem {
            position: absolute;
            width: 6px;
            height: 150px;
            background: linear-gradient(to bottom, #115e59, #042f2e);
            bottom: 0;
            left: calc(50% - 3px);
            border-radius: 3px;
            z-index: 1;
        }

        /* Daun */
        .leaf {
            position: absolute;
            width: 30px;
            height: 15px;
            background: #14b8a6;
            border-radius: 15px 0;
            z-index: 1;
        }

        .leaf.left {
            bottom: 80px;
            right: 50%;
            transform: rotate(-30deg);
        }

        .leaf.right {
            bottom: 50px;
            left: 50%;
            border-radius: 0 15px;
            transform: rotate(30deg);
        }

        /* Efek Teks */
        .message-box {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 2s ease-in-out 2s forwards;
            padding: 0 20px;
        }

        .message-box h1 {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(243, 244, 246, 0.2);
        }

        .highlight {
            color: #ff2e63;
            font-weight: 600;
        }

        /* Animasi Keyframes */
        @keyframes bloom {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="rose">
            <div class="petal center"></div>
            <div class="petal inner-1"></div>
            <div class="petal inner-2"></div>
            <div class="petal outer-1"></div>
            <div class="petal outer-2"></div>
            <div class="petal outer-3"></div>
            <div class="petal outer-4"></div>
        </div>
        <div class="stem">
            <div class="leaf left"></div>
            <div class="leaf right"></div>
        </div>
    </div>

    <div class="message-box">
        <h1>Jangan marah lagi ya, <br><span class="highlight">ini buat kamu!</span></h1>
    </div>

</body>
</html>
