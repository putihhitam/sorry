<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ini Buat Kamu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0f19;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f3f4f6;
        }

        /* Wadah Utama Proyeksi Bunga */
        .flower-container {
            position: relative;
            width: 200px;
            height: 320px;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Batang Tulip (Di paling belakang / z-index rendah) */
        .stem {
            position: absolute;
            width: 5px;
            height: 180px;
            background: linear-gradient(to bottom, #2e7d32, #1b5e20);
            bottom: 0;
            left: calc(50% - 2.5px);
            border-radius: 3px;
            z-index: 1;
        }

        /* Daun Tulip Melengkung Cantik */
        .leaf {
            position: absolute;
            width: 35px;
            height: 70px;
            background: linear-gradient(to top, #388e3c, #4caf50);
            z-index: 2;
        }

        .leaf.left {
            bottom: 40px;
            right: 50%;
            border-radius: 35px 0 35px 0;
            transform-origin: bottom right;
            transform: rotate(-25deg);
            box-shadow: -2px 2px 10px rgba(0,0,0,0.3);
        }

        .leaf.right {
            bottom: 70px;
            left: 50%;
            border-radius: 0 35px 0 35px;
            transform-origin: bottom left;
            transform: rotate(20deg);
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        /* Kepala Bunga Tulip (Di depan batang / z-index tinggi) */
        .tulip {
            position: absolute;
            width: 90px;
            height: 100px;
            bottom: 175px; /* Berada tepat di ujung atas batang */
            left: calc(50% - 45px);
            z-index: 10;
        }

        /* Kelopak Dasar Tulip */
        .petal {
            position: absolute;
            bottom: 0;
            transform-origin: bottom center;
            transition: all 1s ease-in-out;
        }

        /* Kelopak Tengah / Belakang (Pusat Tulip) */
        .petal.center {
            width: 50px;
            height: 85px;
            background: linear-gradient(to top, #ff3d00, #ff1744);
            left: 20px;
            border-radius: 25px 25px 15px 15px;
            z-index: 11;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.2);
        }

        /* Kelopak Kiri (Animasi Mekar Mengembang) */
        .petal.left {
            width: 45px;
            height: 90px;
            background: linear-gradient(to top, #ff1744, #ff5252);
            left: 5px;
            border-radius: 35px 15px 15px 35px;
            z-index: 13;
            box-shadow: -3px 0 15px rgba(255, 23, 68, 0.4);
            animation: bloomLeft 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Kelopak Kanan (Animasi Mekar Mengembang) */
        .petal.right {
            width: 45px;
            height: 90px;
            background: linear-gradient(to top, #d50000, #ff1744);
            right: 5px;
            border-radius: 15px 35px 35px 15px;
            z-index: 12;
            box-shadow: 3px 0 15px rgba(213, 0, 0, 0.4);
            animation: bloomRight 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Cahaya Lembut di Sekitar Bunga */
        .glow {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255,23,68,0.25) 0%, rgba(255,23,68,0) 70%);
            bottom: 165px;
            left: calc(50% - 60px);
            z-index: 5;
            border-radius: 50%;
            animation: pulseGlow 2s infinite alternate;
        }

        /* Efek Teks Memudar Muncul Belakangan */
        .message-box {
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInText 1.5s ease-in-out 1.8s forwards;
            padding: 0 25px;
        }

        .message-box h1 {
            font-size: 1.35rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        .highlight {
            color: #ff3d00;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255, 61, 0, 0.4);
        }

        /* KEYFRAMES ANIMASI */
        
        /* Mekar Kelopak Kiri (Membuka keluar sedikit) */
        @keyframes bloomLeft {
            0% { transform: rotate(15deg) scale(0.6); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: rotate(-14deg) scale(1); }
        }

        /* Mekar Kelopak Kanan (Membuka keluar sedikit) */
        @keyframes bloomRight {
            0% { transform: rotate(-15deg) scale(0.6); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: rotate(14deg) scale(1); }
        }

        /* Efek Lampu / Aura Bunga Berdenyut */
        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Teks Muncul Lembut */
        @keyframes fadeInText {
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <!-- Efek Glow Belakang -->
        <div class="glow"></div>

        <!-- Struktur Utama Tulip -->
        <div class="tulip">
            <div class="petal center"></div>
            <div class="petal left"></div>
            <div class="petal right"></div>
        </div>
        
        <!-- Batang dan Daun di Belakang -->
        <div class="stem">
            <div class="leaf left"></div>
            <div class="leaf right"></div>
        </div>
    </div>

    <!-- Kotak Pesan -->
    <div class="message-box">
        <h1>Jangan marah lagi ya, <br><span class="highlight">ini buat kamu!</span></h1>
    </div>

</body>
</html>
